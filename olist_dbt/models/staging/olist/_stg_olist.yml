version: 2

models:
  - name: stg_olist_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null

  - name: stg_olist_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_olist_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_olist_sellers
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: stg_olist_order_items
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null

  - name: stg_olist_order_payments
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_value
        tests:
          - not_null

  - name: stg_olist_order_reviews
    columns:
      - name: order_id
        tests:
          - not_null
      - name: review_score
        tests:
          - not_null

  - name: stg_olist_geolocation
    columns:
      - name: geolocation_zip_code_prefix
        tests:
          - not_null

  - name: stg_olist_category_translation
    columns:
      - name: product_category_name
        tests:
          - not_null
