version: 2

models:
  - name: dim_customer
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: dim_seller
    columns:
      - name: seller_id
        tests:
          - not_null
          - unique

  - name: dim_product
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: dim_payment_type
    columns:
      - name: payment_type
        tests:
          - not_null
          - unique

  - name: dim_date
    columns:
      - name: full_date
        tests:
          - not_null
          - unique

  - name: dim_geolocation
    columns:
      - name: geolocation_zip_code_prefix
        tests:
          - not_null

  - name: fact_order_items
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null

  - name: fact_order_payments
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_value
        tests:
          - not_null

  - name: fact_order_reviews
    columns:
      - name: order_id
        tests:
          - not_null
      - name: review_score
        tests:
          - not_null
